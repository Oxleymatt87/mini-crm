#search::placeholder{color:#888}

.filter-btn.active{background:#4fc3f7;color:#111;border-color:#4fc3f7}

#sheet-handle{width:40px;height:4px;background:#555;border-radius:2px;margin:10px auto}
#sheet-content{padding:0 18px 24px}
#sheet-name{font-size:20px;font-weight:700;color:#fff;margin-bottom:2px}
#sheet-type-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700;margin-bottom:10px;text-transform:uppercase}

.badge-cold{background:#9e9e9e;color:#111}
.badge-home{background:#2196f3;color:#fff}
#sheet-details{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.detail-card{background:#2a2a4a;border-radius:10px;padding:10px 12px}
.detail-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.detail-value{font-size:15px;font-weight:600;color:#fff}
#sheet-notes{background:#2a2a4a;border-radius:10px;padding:12px;margin:8px 0;font-size:13px;line-height:1.5;color:#ccc}
#sheet-actions{display:flex;gap:8px;margin-top:12px}
.action-btn{flex:1;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px}
#btn-call{background:#43a047;color:#fff}
#btn-nav{background:#1e88e5;color:#fff}
#btn-sv{background:#7b1fa2;color:#fff}
#streetview-container{display:none;width:100%;height:200px;border-radius:10px;margin-top:10px;overflow:hidden}

/* Route bar */
#route-bar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:25;background:rgba(22,22,40,0.97);padding:14px 16px;border-top:2px solid #ff6f00;backdrop-filter:blur(8px)}
#route-info{font-size:13px;color:#ccc;margin-bottom:8px}
#route-stops{font-size:11px;color:#888;margin-bottom:10px;max-height:60px;overflow-y:auto}
#route-actions{display:flex;gap:8px}
#route-actions button{flex:1;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
#launch-route{background:#4caf50;color:#fff}
#clear-route{background:#e53935;color:#fff}

/* Error banner */
#error-banner{display:none;position:fixed;top:0;left:0;right:0;z-index:100;background:#b71c1c;color:#fff;padding:16px;font-size:13px;line-height:1.5;text-align:center}

/* Loading */
#loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:50;color:#fff;font-size:16px;text-align:center}
#loading .spinner{width:40px;height:40px;border:3px solid #333;border-top-color:#4fc3f7;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>

// ── GEOCODING ──
var geocodeQueue = [];
var geocodeIndex = 0;

function geocodeAll() {
  geocodeQueue = prospects.slice();
  geocodeIndex = 0;
  processNextGeocode();
}

function processNextGeocode() {
  if (geocodeIndex >= geocodeQueue.length) return;

  var p = geocodeQueue[geocodeIndex];
  geocoder.geocode({address: p.address}, function(results, status) {
    var pos;
    if (status === 'OK' && results[0]) {
      pos = results[0].geometry.location;
      p.position = {lat: pos.lat(), lng: pos.lng()};
    } else {
      // Fallback: try to match city name
      var fallback = null;
      for (var city in FALLBACK_COORDS) {
        if (p.address.indexOf(city) !== -1) {
          fallback = FALLBACK_COORDS[city];
          break;
        }
      }
      if (fallback) {
        // Offset slightly so pins don't stack
        p.position = {lat: fallback.lat + (Math.random()-0.5)*0.02, lng: fallback.lng + (Math.random()-0.5)*0.02};
      } else {
        p.position = {lat: MAP_CENTER.lat + (Math.random()-0.5)*0.05, lng: MAP_CENTER.lng + (Math.random()-0.5)*0.05};
      }
      console.warn('Geocode failed for "' + p.address + '": ' + status + '. Using fallback.');
    }

    createMarker(p);
    geocodeIndex++;

    // Throttle to stay under geocoding rate limits (50/sec)
    if (geocodeIndex < geocodeQueue.length) {
      setTimeout(processNextGeocode, 120);
    }
  });
}

// ── MARKERS ──
function createMarker(p) {
  var colors = PIN_COLORS[p.type] || PIN_COLORS.prospect;
  var isLarge = p.type === 'whale';
  var scale = isLarge ? 1.4 : 1.0;
  var showCount = p.trucks && p.trucks >= 20;

  var marker = new google.maps.Marker({
    position: p.position,
    map: map,
    title: p.name,
    icon: {
      path: google.maps.SymbolPath.CIRCLE,
      fillColor: colors.bg,
      fillOpacity: 1,
      strokeColor: colors.border,
      strokeWeight: 2,
      scale: isLarge ? 18 : 12,
      labelOrigin: new google.maps.Point(0, 0)
    },
    label: showCount ? {
      text: String(p.trucks),
      color: colors.glyph,
      fontSize: isLarge ? '11px' : '9px',
      fontWeight: '700'
    } : null,
    zIndex: p.type === 'whale' ? 900 : (p.type === 'customer' ? 800 : 700)
  });

  marker.prospectData = p;

  marker.addListener('click', function() {
    if (routeMode) {
      addRouteStop(p);
      return;
    }
    currentProspect = p;
    openSheet(p);
  });

  markers.push(marker);
}

// ── FILTER ──
function filterMarkers() {
  var query = document.getElementById('search').value.toLowerCase().trim();
  markers.forEach(function(m) {
    var p = m.prospectData;
    var matchesFilter = (activeFilter === 'all' || p.type === activeFilter);
    var matchesSearch = (!query || p.name.toLowerCase().indexOf(query) !== -1);
    m.setVisible(matchesFilter && matchesSearch);
  });
}

  badgeEl.id = 'sheet-type-badge';
  badgeEl.textContent = typeLabel;

  var trucksDisplay = p.trucks ? p.trucks + ' trucks' : 'Unknown';
  var driversDisplay = p.drivers ? p.drivers + ' drivers' : '—';
  var spendDisplay = p.spend || 'Unknown';
  var locTypeDisplay = p.locType || '—';

  detailsEl.innerHTML =
    '<div class="detail-card"><div class="detail-label">Fleet Size</div><div class="detail-value">' + trucksDisplay + '</div></div>' +
    '<div class="detail-card"><div class="detail-label">Drivers</div><div class="detail-value">' + driversDisplay + '</div></div>' +
    '<div class="detail-card"><div class="detail-label">Est. Annual Spend</div><div class="detail-value">' + spendDisplay + '</div></div>' +
    '<div class="detail-card"><div class="detail-label">Location Type</div><div class="detail-value">' + locTypeDisplay + '</div></div>' +
    '<div class="detail-card" style="grid-column:1/-1"><div class="detail-label">Address</div><div class="detail-value" style="font-size:13px">' + p.address + '</div></div>';

  notesEl.textContent = p.notes || '';

  // Call button
  var callBtn = document.getElementById('btn-call');
  if (p.phone) {
    callBtn.href = 'tel:' + p.phone.replace(/[^\d+]/g, '');
    callBtn.innerHTML = '&#128222; ' + p.phone;
    callBtn.style.display = 'flex';
  } else {
    callBtn.style.display = 'none';
  }

  // Navigate button
  var navBtn = document.getElementById('btn-nav');
  navBtn.href = 'https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(p.address) + '&origin=' + encodeURIComponent(HOME_ADDRESS);

  // Reset street view
  streetViewOpen = false;
  document.getElementById('streetview-container').style.display = 'none';

  document.getElementById('sheet-overlay').style.display = 'block';
  document.getElementById('sheet').classList.add('open');
}

function closeSheet() {
  document.getElementById('sheet').classList.remove('open');
  setTimeout(function() {
    document.getElementById('sheet-overlay').style.display = 'none';
  }, 300);
}

// ── STREET VIEW ──
function toggleStreetView() {
  var container = document.getElementById('streetview-container');
  if (streetViewOpen) {
    container.style.display = 'none';
    streetViewOpen = false;
    return;
  }

  if (!currentProspect || !currentProspect.position) return;
  container.style.display = 'block';
  streetViewOpen = true;

  var pos = currentProspect.position;
  svService.getPanorama({location: pos, radius: 200}, function(data, status) {
    if (status === 'OK') {
      if (!svPano) {
        svPano = new google.maps.StreetViewPanorama(container, {
          position: data.location.latLng,
          pov: {heading: 0, pitch: 0},
          zoom: 1,
          addressControl: false,
          fullscreenControl: true
        });
      } else {
        svPano.setPosition(data.location.latLng);
      }
    } else {
      container.innerHTML = '<div style="padding:20px;text-align:center;color:#888">No Street View available for this location.</div>';
    }
  });
}

// ── ROUTE MODE ──
function toggleRouteMode() {
  routeMode = !routeMode;
  var btn = document.getElementById('route-btn');
  var bar = document.getElementById('route-bar');

  if (routeMode) {
    btn.textContent = 'Routing...';
    btn.classList.add('active');
    bar.style.display = 'block';
    closeSheet();
  } else {
    btn.textContent = 'Route';
    btn.classList.remove('active');
    bar.style.display = 'none';
  }
}

function addRouteStop(p) {
  // Don't add duplicates
  for (var i = 0; i < routeStops.length; i++) {
    if (routeStops[i].name === p.name) return;
  }
  routeStops.push(p);
  updateRouteDisplay();
}

function updateRouteDisplay() {
  var stopsEl = document.getElementById('route-stops');
  if (routeStops.length === 0) {
    stopsEl.innerHTML = '<em>No stops added yet.</em>';
    return;
  }
  var html = '';
  routeStops.forEach(function(s, i) {
    html += '<div style="margin:2px 0">' + (i+1) + '. ' + s.name;
    html += ' <span style="cursor:pointer;color:#e53935" onclick="removeStop(' + i + ')">&times;</span></div>';
  });
  stopsEl.innerHTML = html;
}

function removeStop(i) {
  routeStops.splice(i, 1);
  updateRouteDisplay();
}

function clearRoute() {
  routeStops = [];
  updateRouteDisplay();
}

function launchRoute() {
  if (routeStops.length === 0) return;

  // Build Google Maps directions URL with waypoints
  // Start and end at home base
  var url = 'https://www.google.com/maps/dir/?api=1';
  url += '&origin=' + encodeURIComponent(HOME_ADDRESS);
  url += '&destination=' + encodeURIComponent(HOME_ADDRESS);

  if (routeStops.length === 1) {
    url += '&waypoints=' + encodeURIComponent(routeStops[0].address);
  } else {
    var waypoints = routeStops.map(function(s){return s.address}).join('|');
    url += '&waypoints=' + encodeURIComponent(waypoints);
  }

  url += '&travelmode=driving';
  window.open(url, '_blank');

  // Exit route mode
  toggleRouteMode();
  clearRoute();
}
</script>
