name: Oxley XR — Android APK

on:
  push:
    branches:
      - main
      - claude/webview-tab-navigation-KaX2T
    paths:
      - 'oxley-xr/**'
      - '.github/workflows/oxley-xr-android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oxley-xr
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: oxley-xr/package-lock.json

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('oxley-xr/android/**/*.gradle*', 'oxley-xr/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install npm deps
        run: npm install

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon
        working-directory: oxley-xr/android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: oxley-xr-release-apk
          path: oxley-xr/android/app/build/outputs/apk/release/*.apk
          retention-days: 30
