<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script>
firebase.initializeApp({apiKey:"AIzaSyDdxP9prJjiFFeJ1XGZewkzstgxf7Ciy4E",authDomain:"inventory-setup-b3f20.firebaseapp.com",projectId:"inventory-setup-b3f20",storageBucket:"inventory-setup-b3f20.firebasestorage.app",messagingSenderId:"162750059985",appId:"1:162750059985:web:bbe5328412c7ef49893cf0"});
const db=firebase.firestore();

const CLAUDE_PROXY_URL='https://claude-proxy.moxley.workers.dev';

let sessionCount=0,parsedItem=null,recognition=null,isListening=false,videoStream=null;

// ── Brands & Models ──
const BRANDS=['amulet','royal black','synergy','advance','hankook','kumho','yokohama','continental','general','bridgestone','michelin','goodyear','cooper','westlake','galaxy','genera','hill rock','vitour','roadmaster','lanvigator','nama','hercules','trans eagle','good trip','gold trip','aplus','anisun','conti','muscle power','lexmont','bzo'];
const MODELS=['AT505','AD507','AA610','AD170','AM201','SL101','TL001','DP209','DL301','DL211','DL-211','AR211','AV211','HRD1','VD88','RM272','RY617','GL689A','SP500','AH32','KRD50','E3/L3','AP','RA','CHS2','HWY CAP','DEEP TREAD'];

// ── Spoken number normalization ──
const NUM_WORDS={'zero':'0','one':'1','two':'2','three':'3','four':'4','five':'5','six':'6','seven':'7','eight':'8','nine':'9','ten':'10','eleven':'11','twelve':'12','twenty two':'22','twenty four':'24','twenty five':'25','twenty':'20','thirty':'30','forty':'40','fifty':'50','point five':'.5','and a half':'.5'};
function normalizeSpoken(text){
  let t=text.toLowerCase();
  for(const[w,d] of Object.entries(NUM_WORDS).sort((a,b)=>b[0].length-a[0].length)){t=t.replace(new RegExp('\\b'+w+'\\b','gi'),d);}
  t=t.replace(/(\d+)\s+[rR]\s+(\d+\.?\d*)/g,'$1R$2');
  t=t.replace(/(\d{2,3})\s*[\/\s]\s*(\d{2,3})\s*[rR]\s*(\d+\.?\d*)/g,'$1/$2R$3');
  return t;
}

function matchModel(text){
  const up=text.toUpperCase().replace(/[\s\-]/g,'');
  for(const m of MODELS){if(up.includes(m.replace(/[\-\/]/g,'')))return m;}
  return null;
}

function parseVoice(rawText){
  const text=normalizeSpoken(rawText);
  let brand='',model='',size='',qty=null,cost=null,zone='';
  const sm=text.match(/\b(\d{2,3}\/\d{2,3}[Rr]\d{1,2}\.?\d*|\d{2}[Rr]\d{2}\.?\d*)\b/);
  if(sm)size=sm[1].toUpperCase().replace('r','R');
  const lower=text.toLowerCase();
  for(const b of BRANDS.sort((a,c)=>c.length-a.length)){if(lower.includes(b)){brand=b.split(' ').map(w=>w[0].toUpperCase()+w.slice(1)).join(' ');break;}}
  const km=matchModel(rawText);if(km)model=km;
  let rem=text;
  if(sm)rem=rem.replace(sm[0],' ');
  if(brand)rem=rem.replace(new RegExp(brand,'i'),' ');
  if(model)rem=rem.replace(new RegExp(model,'i'),' ');
  const nums=[...rem.matchAll(/\b(\d{1,4}(?:\.\d{1,2})?)\b/g)];
  for(const n of nums){const v=parseFloat(n[1]);if(Number.isInteger(v)&&v<=999&&qty===null){qty=v;continue;}if(v>50&&cost===null)cost=v;}
  const zm=rawText.match(/\b(?:zone|rack|row|shelf|bin)\s*([A-Z0-9\-]+)/i);if(zm)zone=zm[0];
  return{brand,model,size,qty,cost,zone};
}

// ── Claude Vision (via claude-proxy Cloudflare Worker) ──
async function scanWithClaude(base64Image){
  showToast('Scanning sidewall...','info');
  document.getElementById('transcriptText').textContent='Claude reading sidewall...';
  const prompt=`You are reading a commercial truck tire sidewall. Extract ONLY these fields from the image:
- brand (manufacturer name, e.g. Amulet, Royal Black, Synergy, Advance, Hankook)
- model (model code, e.g. AT505, AD507, AM201, DP209, SL101)
- size (tire size, e.g. 11R22.5, 11R24.5, 295/75R22.5, 235/85R16)

Respond ONLY with valid JSON like: {"brand":"Amulet","model":"AT505","size":"11R22.5"}
If you cannot read a field clearly, use null. Do not include any other text.`;

  const body={
    messages:[{
      role:'user',
      content:[
        {type:'image',source:{type:'base64',media_type:'image/jpeg',data:base64Image}},
        {type:'text',text:prompt}
      ]
    }]
  };
  dbg('POST '+CLAUDE_PROXY_URL+' — '+base64Image.length+' b64 chars, '+body.messages[0].content.length+' blocks','info');
  const resp=await fetch(CLAUDE_PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  dbg('← '+resp.status+' '+resp.statusText,resp.ok?'ok':'err');
  if(!resp.ok){
    const errTxt=await resp.text().catch(()=>'');
    if(errTxt)dbg('body: '+errTxt.slice(0,200),'err');
    throw new Error('Claude '+resp.status+(errTxt?': '+errTxt.slice(0,120):''));
  }
  const data=await resp.json();
  // Claude message format: { content: [{type:'text', text:'...'}] }
  // Fall back to .text or .completion for defensive handling against proxy shape changes.
  const raw=(Array.isArray(data?.content)?data.content.find(b=>b?.type==='text')?.text:null)||data?.text||data?.completion||'{}';
  dbg('raw: '+String(raw).slice(0,140));
  const cleaned=raw.replace(/```json|```/g,'').trim();
  try{
    const parsed=JSON.parse(cleaned);
    dbg('parsed '+JSON.stringify(parsed),'ok');
    return parsed;
  }catch(e){
    dbg('JSON.parse failed: '+e.message,'err');
    throw e;
  }
}

function showParsed(item){
  parsedItem=item;
  const setInput=(id,val)=>{const el=document.getElementById(id);el.value=val==null?'':String(val);el.classList.remove('missing');};
  setInput('pf-brand',item.brand||'');
  setInput('pf-model',item.model||'');
  setInput('pf-size',item.size||'');
  setInput('pf-qty',item.qty!=null?item.qty:'');
  const sv=(id,val,req)=>{const el=document.getElementById(id);if(val){el.textContent=val;el.className='pf-val';}else{el.textContent=req?'MISSING':'—';el.className=req?'pf-val missing':'pf-val';}};
  sv('pf-cost',item.cost!=null?'$'+item.cost.toFixed(2):null,false);
  sv('pf-zone',item.zone||null,false);
  document.getElementById('parseBox').classList.add('show');
  document.getElementById('btnConfirm').disabled=false;
  // Scroll to parse box
  document.getElementById('parseBox').scrollIntoView({behavior:'smooth',block:'center'});
}
function clearParsed(){
  parsedItem=null;
  ['pf-brand','pf-model','pf-size','pf-qty'].forEach(id=>{const el=document.getElementById(id);if(el){el.value='';el.classList.remove('missing');}});
  document.getElementById('parseBox').classList.remove('show');
}

// Firestore rules require an authenticated user. If sign-in hasn't happened yet,
// fall back to anonymous auth so the intake page works without a login screen.
async function ensureAuth(){
  if(firebase.auth().currentUser)return;
  await firebase.auth().signInAnonymously();
}

async function saveItem(item){
  await ensureAuth();
  const data={brand:item.brand||'',model:item.model||'',size:item.size||'',quantity:item.qty||0,cost:item.cost||null,zone:item.zone||'',created_at:firebase.firestore.FieldValue.serverTimestamp(),updated_at:firebase.firestore.FieldValue.serverTimestamp(),source:'intake'};
  return(await db.collection('items').add(data)).id;
}

function readConfirmInputs(){
  const brand=document.getElementById('pf-brand').value.trim();
  const model=document.getElementById('pf-model').value.trim();
  const size=document.getElementById('pf-size').value.trim();
  const qtyRaw=document.getElementById('pf-qty').value.trim();
  const qty=qtyRaw===''?null:parseInt(qtyRaw,10);
  return {
    brand,model,size,
    qty:isNaN(qty)?null:qty,
    cost:parsedItem&&parsedItem.cost!=null?parsedItem.cost:null,
    zone:parsedItem&&parsedItem.zone?parsedItem.zone:''
  };
}

function addToLog(item,docId){
  sessionCount++;document.getElementById('sessionNum').textContent=sessionCount;
  const log=document.getElementById('logList'),row=document.createElement('div');
  row.className='log-row';row.dataset.docId=docId;
  row.innerHTML=`<div class="log-num">${sessionCount}</div><div class="log-dot"></div><div class="log-info"><div class="log-name">${item.brand} ${item.model||''}</div><div class="log-sub">${item.size}${item.cost?' · $'+item.cost.toFixed(2):''}${item.zone?' · '+item.zone:''}</div></div><div class="log-qty">${item.qty||'?'}</div><button class="log-undo">↩</button>`;
  row.querySelector('.log-undo').addEventListener('click',async()=>{if(row.classList.contains('undone'))return;try{await db.collection('items').doc(docId).delete();row.classList.add('undone');sessionCount--;document.getElementById('sessionNum').textContent=sessionCount;showToast('Removed');}catch(e){showToast('Undo failed',true);}});
  log.prepend(row);
}

function showToast(msg,type=false){
  const t=document.getElementById('toast');t.textContent=msg;
  t.className=type==='err'?'err':type==='info'?'info':'';
  t.style.display='block';setTimeout(()=>{t.style.display='none';},2500);
}

// On-screen debug panel — same signal you'd get from DevTools, without needing USB debugging.
function dbg(msg,type){
  const body=document.getElementById('debugBody');
  if(!body)return;
  const line=document.createElement('div');
  line.className='dbg-line'+(type?' '+type:'');
  const ts=new Date().toLocaleTimeString('en-US',{hour12:false});
  const ts_=document.createElement('span');ts_.className='dbg-t';ts_.textContent=ts;
  line.appendChild(ts_);
  line.appendChild(document.createTextNode(String(msg)));
  body.appendChild(line);
  while(body.children.length>60)body.removeChild(body.firstChild);
  body.scrollTop=body.scrollHeight;
  // Auto-expand on error so issues are surfaced without a tap.
  if(type==='err')document.getElementById('debugPanel').classList.remove('collapsed');
}
document.getElementById('debugHead').addEventListener('click',(e)=>{
  if(e.target.id==='debugClear')return;
  document.getElementById('debugPanel').classList.toggle('collapsed');
});
document.getElementById('debugClear').addEventListener('click',(e)=>{
  e.stopPropagation();
  document.getElementById('debugBody').innerHTML='';
});
window.addEventListener('error',e=>dbg('window.error: '+(e.message||e.error),'err'));
window.addEventListener('unhandledrejection',e=>dbg('unhandled: '+(e.reason&&e.reason.message||e.reason),'err'));
dbg('Ready','ok');

// ── Confirm / Discard ──
document.getElementById('btnConfirm').addEventListener('click',async()=>{
  // Always pull current values from the editable inputs, not the stale scan result —
  // the user is allowed to correct misreads before saving.
  const item=readConfirmInputs();
  const missing=[];
  if(!item.brand)missing.push('pf-brand');
  if(!item.size)missing.push('pf-size');
  if(item.qty==null||item.qty<=0)missing.push('pf-qty');
  ['pf-brand','pf-model','pf-size','pf-qty'].forEach(id=>document.getElementById(id).classList.remove('missing'));
  if(missing.length){
    missing.forEach(id=>document.getElementById(id).classList.add('missing'));
    showToast('Brand, size, and qty are required','err');
    return;
  }
  const btn=document.getElementById('btnConfirm');btn.disabled=true;btn.textContent='Saving...';
  try{
    const docId=await saveItem(item);
    addToLog(item,docId);
    showToast('Saved '+item.brand+' x'+item.qty);
    clearParsed();
    document.getElementById('transcriptText').textContent='Saved. Scan next tire or speak.';
    if(navigator.vibrate)navigator.vibrate([30,30,30]);
  }catch(e){showToast('Save failed: '+e.message,'err');btn.disabled=false;btn.textContent='✓ SAVE';}
});
document.getElementById('btnDiscard').addEventListener('click',()=>{clearParsed();document.getElementById('transcriptText').textContent='Discarded — scan or speak next tire.';});

// ── Camera ──
document.getElementById('btnCamera').addEventListener('click',openCamera);
document.getElementById('btnCameraClose').addEventListener('click',closeCamera);

let captureReady=false,pendingBase64=null;

async function openCamera(){
  const video=document.getElementById('videoEl');
  // Required by iOS Safari and some Android WebViews to prevent fullscreen takeover
  video.setAttribute('playsinline','');
  video.setAttribute('webkit-playsinline','');
  video.muted=true;
  captureReady=false;
  document.getElementById('scanStatus').textContent='Starting camera…';
  try{
    videoStream=await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode:{ideal:'environment'},
        width:{ideal:1920},
        height:{ideal:1080},
        frameRate:{ideal:30}
      },
      audio:false
    });
    video.srcObject=videoStream;
    // Wait for the first frame before allowing capture — otherwise videoWidth/Height can be 0 on Android
    video.onloadedmetadata=()=>{
      video.play().catch(()=>{});
      captureReady=true;
      const track=videoStream.getVideoTracks()[0];
      const s=track&&track.getSettings?track.getSettings():{};
      document.getElementById('scanStatus').textContent=`Ready — ${video.videoWidth}×${video.videoHeight}${s.facingMode?' ('+s.facingMode+')':''}`;
    };
    document.getElementById('cameraOverlay').classList.add('show');
  }catch(e){showToast('Camera error: '+e.message,'err');}
}

function closeCamera(){
  if(videoStream){videoStream.getTracks().forEach(t=>t.stop());videoStream=null;}
  captureReady=false;
  document.getElementById('cameraOverlay').classList.remove('show');
}

// Blob→base64 conversion (safer than toDataURL, avoids canvas tainting edge-cases on Chrome Android)
function blobToBase64(blob){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>{const s=r.result||'';const i=s.indexOf(',');resolve(i>=0?s.slice(i+1):s);};
    r.onerror=()=>reject(new Error('FileReader failed'));
    r.readAsDataURL(blob);
  });
}

// Decide if the decoded stream needs a 90° rotation so text reads upright.
// On Android Chrome, getUserMedia typically returns a landscape buffer (e.g. 1920×1080)
// even when the device is held portrait, so text on the sidewall ends up sideways —
// Claude then reads blanks. We rotate based on the viewport orientation at capture time.
function needsPortraitRotation(w,h){
  const portraitScreen=window.matchMedia('(orientation: portrait)').matches||window.innerHeight>window.innerWidth;
  return portraitScreen && w>h;
}

async function captureFrame(){
  const video=document.getElementById('videoEl');
  const canvas=document.getElementById('snapCanvas');
  const w=video.videoWidth,h=video.videoHeight;
  if(!w||!h)throw new Error('no video frame (width/height=0)');
  const ctx=canvas.getContext('2d');
  if(needsPortraitRotation(w,h)){
    canvas.width=h;canvas.height=w;
    ctx.save();
    ctx.translate(h/2,w/2);
    ctx.rotate(Math.PI/2);
    ctx.drawImage(video,-w/2,-h/2,w,h);
    ctx.restore();
  }else{
    canvas.width=w;canvas.height=h;
    ctx.drawImage(video,0,0,w,h);
  }
  const blob=await new Promise((res,rej)=>{
    // toBlob gives us the raw-encoded JPEG without the base64 decode/re-encode round-trip,
    // which on Android Chrome can otherwise collapse to a near-empty image.
    canvas.toBlob(b=>b?res(b):rej(new Error('toBlob returned null')),'image/jpeg',0.95);
  });
  const base64=await blobToBase64(blob);
  return {base64,blob,width:canvas.width,height:canvas.height,bytes:blob.size};
}

document.getElementById('btnCapture').addEventListener('click',async()=>{
  if(!captureReady){showToast('Camera still starting…','err');return;}
  let frame;
  try{frame=await captureFrame();}
  catch(e){showToast('Capture failed: '+e.message,'err');return;}
  // Sanity check — reject frames that are clearly empty/black (common Android Chrome failure mode)
  dbg('captured '+frame.width+'×'+frame.height+' → '+frame.bytes+' B jpeg');
  if(frame.bytes<8000){showToast(`Frame too small (${frame.bytes}B) — retry`,'err');dbg('frame too small, rejected','err');return;}
  pendingBase64=frame.base64;
  const img=document.getElementById('previewImg');
  img.src='data:image/jpeg;base64,'+frame.base64;
  document.getElementById('previewMeta').textContent=
    `${frame.width}×${frame.height} · ${(frame.bytes/1024).toFixed(0)} KB · q=0.95`;
  document.getElementById('previewOverlay').classList.add('show');
});

document.getElementById('btnPreviewRetake').addEventListener('click',()=>{
  pendingBase64=null;
  document.getElementById('previewOverlay').classList.remove('show');
});

document.getElementById('btnPreviewSend').addEventListener('click',async()=>{
  if(!pendingBase64)return;
  const base64=pendingBase64;pendingBase64=null;
  document.getElementById('previewOverlay').classList.remove('show');
  closeCamera();
  try{
    const result=await scanWithClaude(base64);
    if(!result.brand&&!result.model&&!result.size){
      showToast('Claude read nothing — reframe and retry','err');
      document.getElementById('transcriptText').textContent='No fields read — move closer / steady the shot';
      return;
    }
    const item={brand:result.brand||'',model:result.model||'',size:result.size||'',qty:null,cost:null,zone:''};
    document.getElementById('transcriptText').textContent='Sidewall read — enter qty below';
    showParsed(item);
    showToast('Sidewall read — add qty then SAVE');
  }catch(e){
    showToast('Scan failed: '+e.message,'err');
    document.getElementById('transcriptText').textContent='Scan failed — try again';
  }
});

// ── Voice ──
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(SR){
  recognition=new SR();recognition.continuous=false;recognition.interimResults=true;recognition.lang='en-US';
  recognition.onresult=(e)=>{let interim='',final='';for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)final+=e.results[i][0].transcript;else interim+=e.results[i][0].transcript;}const tt=document.getElementById('transcriptText');if(interim){tt.textContent=interim;tt.classList.add('interim');}if(final){tt.textContent=final;tt.classList.remove('interim');showParsed(parseVoice(final));}};
  recognition.onend=()=>{isListening=false;document.getElementById('listeningDot').classList.remove('active');document.getElementById('btnMic').classList.remove('listening');document.getElementById('micLabel').textContent='TAP TO SPEAK';};
  recognition.onerror=(e)=>{isListening=false;document.getElementById('listeningDot').classList.remove('active');document.getElementById('btnMic').classList.remove('listening');document.getElementById('micLabel').textContent='TAP TO SPEAK';if(e.error!=='no-speech')showToast('Mic: '+e.error,'err');};
}
document.getElementById('btnMic').addEventListener('click',()=>{
  if(!recognition){showToast('Voice not supported','err');return;}
  if(isListening){recognition.stop();}
  else{clearParsed();document.getElementById('transcriptText').textContent='Listening...';document.getElementById('transcriptText').classList.add('interim');recognition.start();isListening=true;document.getElementById('listeningDot').classList.add('active');document.getElementById('btnMic').classList.add('listening');document.getElementById('micLabel').textContent='TAP TO STOP';if(navigator.vibrate)navigator.vibrate(20);}
});

// ── Manual ──
document.getElementById('btnManual').addEventListener('click',()=>{document.getElementById('manualModal').classList.add('show');document.getElementById('m-brand').focus();});
document.getElementById('btnManualClose').addEventListener('click',()=>{document.getElementById('manualModal').classList.remove('show');});
document.getElementById('btnManualSave').addEventListener('click',async()=>{
  const item={brand:document.getElementById('m-brand').value.trim(),model:document.getElementById('m-model').value.trim(),size:document.getElementById('m-size').value.trim(),qty:parseInt(document.getElementById('m-qty').value)||0,cost:parseFloat(document.getElementById('m-cost').value)||null,zone:document.getElementById('m-zone').value.trim()};
  if(!item.brand||!item.size||!item.qty){showToast('Brand, size, qty required','err');return;}
  try{const docId=await saveItem(item);addToLog(item,docId);showToast('Saved '+item.brand+' x'+item.qty);document.getElementById('manualModal').classList.remove('show');['m-brand','m-model','m-size','m-qty','m-cost','m-zone'].forEach(id=>document.getElementById(id).value='');}
  catch(e){showToast('Save failed','err');}
});
document.getElementById('btnClearLog').addEventListener('click',()=>{document.getElementById('logList').innerHTML='';sessionCount=0;document.getElementById('sessionNum').textContent='0';});
</script>
