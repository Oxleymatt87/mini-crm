name = "oxley-mcp-server"
main = "worker.js"
compatibility_date = "2025-01-15"
account_id = "e450a418975ed9b1212f52452bb1b5d5"

# MCP server that proxies qbo-refresh-worker's read-only endpoints as MCP tools.
# No secrets needed here — the upstream worker owns the QBO/Plaid tokens.
[vars]
UPSTREAM_BASE = "https://qbo-refresh-worker.moxley.workers.dev"

# Service binding to qbo-refresh-worker. Required: a Worker cannot subrequest
# another *.workers.dev URL on the same account (Cloudflare error 1042), so the
# upstream is reached via this binding rather than its public URL.
[[services]]
binding = "QBO"
service = "qbo-refresh-worker"

# Read-only access to the QBO/Plaid OAuth tokens for the qbo_token_status tool.
[[kv_namespaces]]
binding = "QBO_TOKENS"
id = "9e61d4d0d02a476692cfa71c1002908b"

[observability]
enabled = true

[observability.logs]
enabled = true
