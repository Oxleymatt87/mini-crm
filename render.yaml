services:
  - type: web
    name: mini-crm-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_MIN
        value: "1440"
      - key: DATABASE_URL
        fromDatabase:
          name: mini-crm-db
          property: connectionString
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: QB_CLIENT_ID
        sync: false
      - key: QB_CLIENT_SECRET
        sync: false
      - key: QB_REFRESH_TOKEN
        sync: false
      - key: QB_REALM_ID
        sync: false
      - key: QB_ENVIRONMENT
        value: "production"
      - key: QB_REDIRECT_URI
        value: "https://mini-crm-api-kab0.onrender.com/quickbooks/callback"
      - key: FRONTEND_URL
        value: "https://mini-crm-api-kab0.onrender.com"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: "https://mini-crm-api-kab0.onrender.com/google/callback"
    healthCheckPath: /health
    autoDeploy: true

databases:
  - name: mini-crm-db
    databaseName: mini_crm
    plan: free
