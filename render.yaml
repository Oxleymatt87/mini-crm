services:
  - type: web
    name: mini-crm-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_MIN
        value: "1440"
      - key: DATABASE_URL
        fromDatabase:
          name: mini-crm-db
          property: connectionString
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: QB_CLIENT_ID
        sync: false
      - key: QB_CLIENT_SECRET
        sync: false
      - key: QB_ENVIRONMENT
        value: "production"
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: /health
    autoDeploy: true

databases:
  - name: mini-crm-db
    databaseName: mini_crm
    plan: free
