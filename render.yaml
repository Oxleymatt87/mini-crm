services:
  - type: web
    name: mini-crm-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_MIN
        value: "1440"
      # DATABASE_URL is resolved at runtime from Firestore (config/backend.databaseUrl)
      # so the connection string is never stored in this public repo. Optionally set
      # DATABASE_URL here as an env var to override.
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: QB_CLIENT_ID
        sync: false
      - key: QB_CLIENT_SECRET
        sync: false
      - key: QB_REFRESH_TOKEN
        sync: false
      - key: QB_REALM_ID
        sync: false
      - key: QB_ENVIRONMENT
        value: "production"
      - key: QB_REDIRECT_URI
        value: "https://mini-crm-api-kab0.onrender.com/quickbooks/callback"
      - key: FRONTEND_URL
        value: "https://mini-crm-api-kab0.onrender.com"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: "https://mini-crm-api-kab0.onrender.com/google/callback"
    healthCheckPath: /health
    autoDeploy: true
