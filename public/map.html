const INDUSTRY = {
  'OIL':{bg:'#000000',emoji:'🛢️'},
  'TRK':{bg:'#2563eb',emoji:'🚛'},
  'CON':{bg:'#f97316',emoji:'🏗️'},
  'CRN':{bg:'#a855f7',emoji:'🏗️'},
  'IND':{bg:'#475569',emoji:'⚙️'},
  'MAT':{bg:'#92400e',emoji:'🪨'},
  'LOG':{bg:'#166534',emoji:'🌲'},
  'AGR':{bg:'#65a30d',emoji:'🌾'},
  'FUL':{bg:'#dc2626',emoji:'⛽'},
  'SVC':{bg:'#0d9488',emoji:'🔧'},
  '???':{bg:'#d1d5db',emoji:''}
};

function getIndustryCode(loc) {
  const n = ((loc.name||'')+' '+(loc.locType||'')).toLowerCase();
  if (/vacuum|oilfield|oil|drilling|swabbing|well|petroleum|energy|pipeline|\bgas\b|combustion/.test(n)) return 'OIL';
  if (/trucking|transport|freight|hauling|logistics|delivery|carrier|heavy haul|hotshot|towing/.test(n)) return 'TRK';
  if (/concrete|ready.?mix|cement|paving|construction|excavat|dozer/.test(n)) return 'CON';
  if (/crane|rigging|lifting|hoist/.test(n)) return 'CRN';
  if (/logging|timber|\btree\b/.test(n)) return 'LOG';
  if (/industrial|manufactur|fabricat|welding|steel|iron|metal|tank|pipe|refin|chemical/.test(n)) return 'IND';
  if (/gravel|sand|rock|material|lumber|pallet|wood|recycl|supply|\bmat\b/.test(n)) return 'MAT';
  if (/dirt/.test(n)) return 'CON';
  if (/farm|ranch|cattle|grain|hay|\bag\b|feed|honey/.test(n)) return 'AGR';
  if (/propane|fuel|butane|gas co/.test(n)) return 'FUL';
  if (/tire|mechanic|repair|septic|waste|environmental|cleanup/.test(n)) return 'SVC';
  return '???';
}

// Create a styled HTML circle element for AdvancedMarkerElement content
function pinEl(bg, content, sz, isText) {
  const el = document.createElement('div');
  const efs = isText ? Math.round(sz * 0.38) : Math.round(sz * 0.5);
  el.style.cssText = `width:${sz}px;height:${sz}px;border-radius:50%;background:${bg};border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-size:${efs}px;box-shadow:0 2px 8px rgba(0,0,0,0.6);cursor:pointer;line-height:1;` + (isText ? 'color:#fff;font-weight:900;font-family:Arial,sans-serif;' : '');
  el.textContent = content;
  return el;
}

function getMarkerContent(loc) {
  const code = getIndustryCode(loc);
  if (loc.type === 'home') return pinEl('#3b82f6', '🏠', 40, false);
  if (loc.type === 'whale') return pinEl('#dc2626', loc.trucks ? String(loc.trucks) : 'W', 48, true);
  if (loc.type === 'customer') return pinEl('#22c55e', '💰', 40, false);
  if (code === '???') {
    const el = document.createElement('div');
    el.style.cssText = 'width:20px;height:20px;border-radius:50%;background:#d1d5db;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.4);cursor:pointer;';
    return el;
  }
  const ind = INDUSTRY[code];
  return pinEl(ind.bg, ind.emoji, 36, false);
}

let map, markers = [], activeFilter = 'all', routeMode = false, routeStops = [];
let flyInterval = null, isTilted = false, preZoom = null, preCenter = null, flyAngle = 0;

function scaleMarkers() {
  if (!map) return;
  const z = map.getZoom();
  // 0.7 at zoom 8, 1.0 at zoom 13+, smooth in between
  const scale = Math.min(1, Math.max(0.7, 0.7 + (z - 8) * 0.06));
  for (const m of markers) {
    if (m._el) m._el.style.transform = 'scale(' + scale + ')';
  }
}

function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: {lat:30.05, lng:-94.55}, zoom:10,
    mapTypeId: 'hybrid',
    mapId: 'DEMO_MAP_ID',
    tilt: 0,
    heading: 0,
    disableDefaultUI: true, zoomControl: true,
    gestureHandling: 'greedy',
    rotateControl: true
  });

  locations.forEach((loc, i) => {
    const el = getMarkerContent(loc);
    const marker = new google.maps.marker.AdvancedMarkerElement({
      position: {lat:loc.lat, lng:loc.lng},
      map: map,
      title: loc.name,
      content: el
    });
    marker._loc = loc;
    marker._idx = i;
    marker._visible = true;
    marker._el = el;
    marker.addListener('click', () => onMarkerClick(marker));
    markers.push(marker);
  });

  updateStats();

  // Scale markers with zoom level — idle fires after zoom animation settles
  map.addListener('idle', scaleMarkers);
  scaleMarkers();

  // Load additional prospects from JSON
  fetch('/prospects.json')
    .then(r => r.json())
    .then(places => {
      places.forEach(p => {
        const loc = {name:p.n,lat:p.t,lng:p.g,addr:p.a,trucks:null,drivers:null,phone:null,type:'wantgo',notes:'Prospect from list',spend:null,locType:'Prospect'};
        const el = getMarkerContent(loc);
        const marker = new google.maps.marker.AdvancedMarkerElement({
          position:{lat:p.t,lng:p.g},
          map:map,
          title:p.n,
          content: el
        });
        marker._loc = loc;
        marker._idx = locations.length;
        marker._visible = true;
        marker._el = el;
        locations.push(loc);
        marker.addListener('click', () => onMarkerClick(marker));
        markers.push(marker);
      });
      updateStats();
      scaleMarkers();
    })
    .catch(e => console.error('Failed to load prospects.json:', e));
}

function onMarkerClick(marker) {
  const loc = marker._loc;
  if (routeMode) {
    const exists = routeStops.findIndex(s => s._idx === marker._idx);
    if (exists > -1) {
      routeStops.splice(exists, 1);
    } else {
      routeStops.push(marker);
    }
    document.getElementById('routeInfo').textContent = routeStops.length + ' stop' + (routeStops.length!==1?'s':'') + ' selected';
    return;
  }
  map.panTo(marker.position);
  if (map.getZoom() < 17) map.setZoom(17);
  openSheet(loc);
}

function showStreetView(lat, lng) {
  const svContainer = document.getElementById('svContainer');

    svContainer.style.display = 'none';
    return;
  }
  svContainer.style.display = 'block';
  new google.maps.StreetViewPanorama(svContainer, {
    position: {lat, lng},
    pov: {heading:0, pitch:0},
    zoom: 1,
    disableDefaultUI: true,
    showRoadLabels: false
  });

function applyFilters() {
  const q = document.getElementById('searchBar').value.toLowerCase();
  let shown = 0, totalTrucks = 0;
  markers.forEach(m => {
    const loc = m._loc;
    const matchFilter = activeFilter === 'all' || loc.type === activeFilter;
    const matchSearch = !q || loc.name.toLowerCase().includes(q) || (loc.addr && loc.addr.toLowerCase().includes(q)) || (loc.notes && loc.notes.toLowerCase().includes(q));
    const visible = matchFilter && matchSearch;
    m.map = visible ? map : null;
    m._visible = visible;
    if (visible) { shown++; totalTrucks += loc.trucks || 0; }
  });
  document.getElementById('statsBar').textContent = shown + ' shown \u00B7 ' + totalTrucks + ' trucks';
}

function updateStats() {
  let shown = 0, totalTrucks = 0;
  markers.forEach(m => {
    if (m._visible) { shown++; totalTrucks += m._loc.trucks || 0; }
  });
  document.getElementById('statsBar').textContent = shown + ' shown \u00B7 ' + totalTrucks + ' trucks';
}

// ─── 3D / Fly Controls ───
// Raster satellite supports tilt 0|45 and heading 0|90|180|270 at zoom >= 18.
// For "fly" we orbit the center in a circle while stepping headings.

document.getElementById('btn3D').addEventListener('click', () => {
  console.log('3D tapped, isTilted:', isTilted);
  isTilted = !isTilted;
  const btn3D = document.getElementById('btn3D');
  if (isTilted) {
    preZoom = map.getZoom();
    preCenter = map.getCenter().toJSON();
    map.setZoom(18);
    setTimeout(() => { map.setTilt(45); }, 300);
    btn3D.classList.add('active');
    btn3D.textContent = '2D';
  } else {
    stopFly();
    map.setTilt(0);
    map.setHeading(0);
    if (preZoom) map.setZoom(preZoom);
    if (preCenter) map.setCenter(preCenter);
    preZoom = null; preCenter = null;
    btn3D.classList.remove('active');
    btn3D.textContent = '3D';
  }
});

function stopFly() {
  if (flyInterval) {
    clearInterval(flyInterval);
    flyInterval = null;
    document.getElementById('btnFly').classList.remove('active');
  }
}

document.getElementById('btnFly').addEventListener('click', () => {
  console.log('Fly tapped, flyInterval:', flyInterval);
  const btn = document.getElementById('btnFly');
  if (flyInterval) {
    stopFly();
    return;
  }
  // Enter 3D if not already
  if (!isTilted) {
    document.getElementById('btn3D').click();
  }
  // Wait for zoom/tilt to settle, then start orbit
  setTimeout(() => {
    const orbitCenter = map.getCenter().toJSON();
    const radius = 0.003; // ~300m orbit radius
    flyAngle = 0;
    const headings = [0, 90, 180, 270];
    let hIdx = 0;
    let stepCount = 0;
    flyInterval = setInterval(() => {
      flyAngle += 0.6; // degrees per tick
      if (flyAngle >= 360) flyAngle -= 360;
      const rad = flyAngle * Math.PI / 180;
      const lat = orbitCenter.lat + radius * Math.cos(rad);
      const lng = orbitCenter.lng + radius * Math.sin(rad);
      map.setCenter({lat, lng});
      // Step heading every 90 degrees of orbit
      stepCount++;
      if (stepCount % 150 === 0) {
        hIdx = (hIdx + 1) % 4;
        map.setHeading(headings[hIdx]);
      }
    }, 50);
    btn.classList.add('active');
    console.log('Fly started — orbiting', orbitCenter);
  }, 500);
});

async function loadQBOData() {

    const [custSnap, noteSnap] = await Promise.all([
      fbDb.collection('customers').get(),
      fbDb.collection('map_notes').get()
    ]);
    qboCustomers = custSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    noteSnap.docs.forEach(d => { mapNotesCache[d.id] = d.data().notes || ''; });
  } catch(e) { console.error('Firebase load error:', e); }
}

function findQBOMatch(pinName) {
  const clean = s => (s||'').toLowerCase().replace(/[^a-z0-9]/g,'');
  const pin = clean(pinName);
  if (!pin) return null;
  let best = null, bestScore = 0;
  for (const c of qboCustomers) {
    for (const field of [c.display_name, c.company_name]) {
      const val = clean(field);
      if (!val) continue;
      if (val === pin || pin.includes(val) || val.includes(pin)) {
        const score = val === pin ? 100 : Math.min(val.length, pin.length);
        if (score > bestScore) { bestScore = score; best = c; }
      }
    }
  }
  return bestScore >= 3 ? best : null;
}

function getPinKey(loc) {
  return loc.name.replace(/[^a-zA-Z0-9]/g,'_').substring(0,60);
}

async function loadInvoicesFor(customerName) {
  if (!fbUser) return [];
  try {
    const snap = await fbDb.collection('invoices')
      .where('customer_name','==',customerName)
      .orderBy('created_at','desc').limit(5).get();
    return snap.docs.map(d => d.data());
  } catch(e) { return []; }
}

async function saveMapNote(pinKey, textarea) {
  if (!fbUser) return;
  const notes = textarea.value;
  try {
    await fbDb.collection('map_notes').doc(pinKey).set({
      notes: notes,
      updated_at: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
    mapNotesCache[pinKey] = notes;
    const status = document.getElementById('noteStatus');
    if (status) { status.style.display = 'inline'; setTimeout(() => status.style.display = 'none', 2000); }
  } catch(e) { console.error('Save note error:', e); }
}

// ─── Voice Commands ───
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null, isListening = false;

if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-US';

  recognition.onstart = () => {
    isListening = true;
    document.getElementById('micBtn').classList.add('listening');
  };
  recognition.onend = () => {
    isListening = false;
    document.getElementById('micBtn').classList.remove('listening');
  };
  recognition.onerror = (e) => {
    isListening = false;
    document.getElementById('micBtn').classList.remove('listening');
    if (e.error !== 'no-speech') showToast('Voice error: ' + e.error);
  };
  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript.trim();
    showToast('"' + transcript + '"');
    handleVoiceCommand(transcript);
  };
}

document.getElementById('micBtn').addEventListener('click', () => {
  if (!recognition) { showToast('Voice not supported'); return; }
  if (isListening) { recognition.stop(); return; }
  recognition.start();
});

function showToast(msg) {
  const t = document.getElementById('voiceToast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}

function handleVoiceCommand(text) {
  const t = text.toLowerCase();

  const industryMap = {
    'oil': 'OIL', 'oilfield': 'OIL',
    'trucking': 'TRK', 'trucks': 'TRK',
    'concrete': 'CON', 'crane': 'CRN',
    'industrial': 'IND', 'materials': 'MAT',
    'logging': 'LOG', 'ag': 'AGR', 'agriculture': 'AGR',
    'fuel': 'FUL', 'service': 'SVC'
  };

  for (const [word, code] of Object.entries(industryMap)) {
    if (t === 'show ' + word || t.startsWith('show ' + word + ' ') || t === 'show ' + word + 's') {
      clickIndustryFilter(code); return;
    }
  }

  if (/^show\s+customers?$/i.test(t)) { clickFilterBtn('customer'); return; }
  if (/^show\s+whales?$/i.test(t)) { clickFilterBtn('whale'); return; }
  if (/^show\s+prospects?$/i.test(t)) { clickFilterBtn('prospect'); return; }
  if (/^show\s+all$/i.test(t)) { clickFilterBtn('all'); return; }

  if (t.startsWith('zoom ')) { zoomToCompany(text.substring(5).trim()); return; }
  if (t.startsWith('search ')) {
    const sb = document.getElementById('searchBar');
    sb.value = text.substring(7).trim();
    sb.dispatchEvent(new Event('input'));
    return;
  }
  if (/^route$/i.test(t)) { if (!routeMode) document.getElementById('routeBtn').click(); return; }
  if (/^go$/i.test(t)) { document.getElementById('routeLaunch').click(); return; }

  sendToChat(text);
}

function clickFilterBtn(filterVal) {
  const btn = document.querySelector('.filterBtn[data-f="' + filterVal + '"]');
  if (btn) btn.click();
}

function clickIndustryFilter(code) {
  clickFilterBtn('all');
  const codeToSearch = {
    'OIL':'oilfield','TRK':'trucking','CON':'concrete','CRN':'crane',
    'IND':'industrial','MAT':'material','LOG':'logging','AGR':'farm','FUL':'propane','SVC':'tire'
  };
  const sb = document.getElementById('searchBar');
  sb.value = codeToSearch[code] || code;
  sb.dispatchEvent(new Event('input'));
}

function zoomToCompany(name) {
  const q = name.toLowerCase();
  let best = null, bestScore = 0;
  markers.forEach(m => {
    const n = m._loc.name.toLowerCase();
    if (n === q) { best = m; bestScore = 1000; return; }
    if (n.includes(q) || q.includes(n)) {
      const score = Math.min(n.length, q.length);
      if (score > bestScore) { bestScore = score; best = m; }
    }
  });
  if (best) {
    map.panTo(best.position);
    map.setZoom(17);
    openSheet(best._loc);
    showToast('Found: ' + best._loc.name);
  } else {
    showToast('Not found: ' + name);
  }
}

// ─── Claude AI Chat ───
const CLAUDE_WORKER_URL = 'https://claude-proxy.moxley.workers.dev';
let chatHistory = [];

document.getElementById('chatToggle').addEventListener('click', () => {
  document.getElementById('chatPanel').classList.toggle('open');
});
document.getElementById('chatMin').addEventListener('click', () => {
  document.getElementById('chatPanel').classList.remove('open');
});
document.getElementById('chatSend').addEventListener('click', () => {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  sendToChat(msg);
});
document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('chatSend').click();
});

function getVisiblePinContext() {
  const data = [];
  markers.forEach(m => {
    if (!m._visible) return;
    const l = m._loc;
    const parts = [l.name + ' (' + l.type + ')'];
    if (l.trucks) parts.push(l.trucks + ' trucks');
    if (l.locType) parts.push(l.locType);
    if (l.spend) parts.push(l.spend);
    if (l.notes) parts.push(l.notes);
    data.push(parts.join(', '));
  });
  return data.join('\n');
}

function sendToChat(userMsg) {
  document.getElementById('chatPanel').classList.add('open');
  const messagesEl = document.getElementById('chatMessages');

  const userDiv = document.createElement('div');
  userDiv.className = 'msg-user';
  userDiv.textContent = 'You: ' + userMsg;
  messagesEl.appendChild(userDiv);

  const thinkDiv = document.createElement('div');
  thinkDiv.className = 'msg-thinking';
  thinkDiv.textContent = 'Thinking...';
  messagesEl.appendChild(thinkDiv);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  chatHistory.push({ role: 'user', content: userMsg });

  fetch(CLAUDE_WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages: chatHistory.slice(-6), context: getVisiblePinContext() })
  })
  .then(r => r.json())
  .then(data => {
    thinkDiv.remove();
    const reply = data.content && data.content[0] ? data.content[0].text : 'No response received.';
    chatHistory.push({ role: 'assistant', content: reply });
    const aiDiv = document.createElement('div');
    aiDiv.className = 'msg-ai';
    aiDiv.textContent = 'AI: ' + reply;
    messagesEl.appendChild(aiDiv);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  })
  .catch(() => {
    thinkDiv.remove();
    const errDiv = document.createElement('div');
    errDiv.className = 'msg-ai';
    errDiv.textContent = 'Could not reach AI assistant.';
    messagesEl.appendChild(errDiv);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });
}

// ─── Territory Table ───
let territoryOpen = false, territoryFilter = 'all', territoryRefreshTimer = null;
const LIVE_INTERVAL = 60000;    // 60 seconds when live enabled
const IDLE_INTERVAL = 180000;   // 3 minutes otherwise

function haversine(lat1, lng1, lat2, lng2) {
  const R = 3958.8; // Earth radius in miles
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

const TYPE_EMOJI = {whale:'\uD83D\uDC0B',customer:'\uD83D\uDCB0',prospect:'\uD83D\uDCC8',cold:'\u2744\uFE0F',saved:'\uD83D\uDCCC',wantgo:'\uD83C\uDFAF',home:'\uD83C\uDFE0'};

function renderTerritoryTable() {
  const origin = gpsPos || {lat:30.0688,lng:-94.1777};
  const q = document.getElementById('territorySearch').value.toLowerCase();
  const list = document.getElementById('territoryList');

  // Build rows from all locations
  let rows = locations.map((loc, i) => {
    const dist = haversine(origin.lat, origin.lng, loc.lat, loc.lng);
    return { loc, dist, idx: i };
  });

  // Filter by type
  if (territoryFilter !== 'all') {
    rows = rows.filter(r => r.loc.type === territoryFilter);
  }
  // Filter by search
  if (q) {
    rows = rows.filter(r =>
      r.loc.name.toLowerCase().includes(q) ||
      (r.loc.addr && r.loc.addr.toLowerCase().includes(q)) ||
      (r.loc.notes && r.loc.notes.toLowerCase().includes(q))
    );
  }

  // Sort by distance
  rows.sort((a, b) => a.dist - b.dist);

  // Update count
  const totalTrucks = rows.reduce((s, r) => s + (r.loc.trucks || 0), 0);
  document.getElementById('territoryCount').textContent = rows.length + ' locations \u00B7 ' + totalTrucks + ' trucks \u00B7 from ' + (gpsPos ? 'GPS' : 'home base');

  // Render card list
  let html = '';
  for (const r of rows) {
    const distStr = r.dist < 1 ? (r.dist * 5280).toFixed(0) + ' ft' : r.dist.toFixed(1) + ' mi';
    const emoji = TYPE_EMOJI[r.loc.type] || '\u2753';
    const trucksStr = r.loc.trucks ? r.loc.trucks + ' trucks' : '';
    const locType = r.loc.locType || '';
    const sub = [locType, trucksStr].filter(Boolean).join(' \u00B7 ');
    html += `<div class="t-row" data-tidx="${r.idx}">
      <div class="t-emoji t-emoji-${r.loc.type}">${emoji}</div>
      <div class="t-info">
        <div class="t-name">${r.loc.name}</div>
        <div class="t-sub">${sub}</div>
      </div>
      <div class="t-dist">${distStr}</div>
    </div>`;
  }
  list.innerHTML = html;

  // Update refresh timestamp
  const now = new Date();
  const isLive = document.getElementById('liveCheck').checked;
  const nextSec = isLive ? 60 : 180;
  document.getElementById('territoryRefreshInfo').textContent = 'Updated ' + now.toLocaleTimeString() + ' \u00B7 next in ' + nextSec + 's \u00B7 sorted by distance';
}

function startTerritoryRefresh() {
  stopTerritoryRefresh();
  const isLive = document.getElementById('liveCheck').checked;
  const interval = isLive ? LIVE_INTERVAL : IDLE_INTERVAL;
  territoryRefreshTimer = setInterval(() => {
    if (territoryOpen) renderTerritoryTable();
  }, interval);
}

function stopTerritoryRefresh() {
  if (territoryRefreshTimer) { clearInterval(territoryRefreshTimer); territoryRefreshTimer = null; }
}

// Toggle territory panel
document.getElementById('territoryBtn').addEventListener('click', () => {
  territoryOpen = !territoryOpen;
  document.getElementById('territoryPanel').classList.toggle('open', territoryOpen);
  document.getElementById('territoryBtn').classList.toggle('active', territoryOpen);
  if (territoryOpen) {
    renderTerritoryTable();
    startTerritoryRefresh();
  } else {
    stopTerritoryRefresh();
  }
});

document.getElementById('territoryClose').addEventListener('click', () => {
  territoryOpen = false;
  document.getElementById('territoryPanel').classList.remove('open');
  document.getElementById('territoryBtn').classList.remove('active');
  stopTerritoryRefresh();
});

// Territory filter buttons
document.getElementById('territoryFilter').addEventListener('click', e => {
  if (!e.target.classList.contains('tFilterBtn')) return;
  document.querySelectorAll('.tFilterBtn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  territoryFilter = e.target.dataset.tf;
  renderTerritoryTable();
});

// Territory search
document.getElementById('territorySearch').addEventListener('input', () => renderTerritoryTable());

// Live toggle
document.getElementById('liveCheck').addEventListener('change', () => {
  const isLive = document.getElementById('liveCheck').checked;
  document.getElementById('liveDot').classList.toggle('active', isLive);
  if (territoryOpen) startTerritoryRefresh();
  renderTerritoryTable();
});

// Tap row to zoom on map
document.getElementById('territoryList').addEventListener('click', e => {
  const row = e.target.closest('.t-row');
  if (!row) return;
  const idx = parseInt(row.dataset.tidx);
  const loc = locations[idx];
  if (!loc) return;
  // Close panel, zoom to location, open its detail sheet
  territoryOpen = false;
  document.getElementById('territoryPanel').classList.remove('open');
  document.getElementById('territoryBtn').classList.remove('active');
  stopTerritoryRefresh();
  map.panTo({ lat: loc.lat, lng: loc.lng });
  map.setZoom(17);
  openSheet(loc);
});

function startGPS() {
  if (!navigator.geolocation) return;
  navigator.geolocation.watchPosition(
    pos => {
      gpsPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      if (!gpsMarker && map) {
        gpsMarker = new google.maps.marker.AdvancedMarkerElement({
          position: gpsPos,
          map: map,
          content: createGpsDotEl(),
          zIndex: 9999
        });
      } else if (gpsMarker) {
        gpsMarker.position = gpsPos;
      }
    },
    err => console.warn('GPS error:', err.message),
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
  );
}

document.getElementById('btnLocate').addEventListener('click', () => {
  if (gpsPos && map) {
    map.panTo(gpsPos);
    map.setZoom(15);
  } else if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        gpsPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        map.panTo(gpsPos);
        map.setZoom(15);
      },
      () => showToast('Location unavailable')
    );
  } else {
    showToast('GPS not supported');
  }
});

const _origInitMap = initMap;
initMap = function() {
  _origInitMap();
  startGPS();
};
