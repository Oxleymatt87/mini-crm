<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#080a0d">
<title>Oxley Tire — Ledger</title>
<style>
:root{
  --bg:#080a0d;
  --surface:#111318;
  --surface2:#181b23;
  --border:#1e2229;
  --text:#e8eaf0;
  --text2:#8990a0;
  --text3:#555d6b;
  --gold:#d4a12a;
  --green:#22c55e;
  --yellow:#eab308;
  --red:#ef4444;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
.wrap{padding:18px 16px 24px;max-width:760px;margin:0 auto}
h2{font-size:14px;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:12px}
.card .k{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.card .v{font-size:22px;font-weight:700;color:var(--gold)}
.placeholder{margin-top:24px;padding:32px 18px;background:var(--surface);border:1px dashed var(--border);border-radius:12px;text-align:center;color:var(--text3);font-size:13px;line-height:1.5}
.placeholder strong{color:var(--text2);display:block;margin-bottom:6px;font-size:14px}
</style>
</head>
<body>
<div class="wrap">
  <h2>Ledger</h2>
  <div class="card"><div class="k">Open Balance</div><div class="v">—</div></div>
  <div class="card"><div class="k">YTD Sales</div><div class="v">—</div></div>
  <div class="card"><div class="k">YTD Cost</div><div class="v">—</div></div>
  <div class="placeholder">
    <strong>Ledger coming soon</strong>
    Aggregated A/R, payments, and P&amp;L roll-ups will land here.
  </div>
</div>
<script src="/js/nav.js"></script>
</body>
</html>
