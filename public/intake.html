<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Oxley Tire — Intake</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0a0c0f;color:#e8eaf0;font-family:sans-serif;min-height:100vh;display:flex;flex-direction:column;overflow:hidden}
#header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px;border-bottom:1px solid #1e2229;flex-shrink:0}
#header h1{font-size:15px;color:#d4a12a;letter-spacing:2px;text-transform:uppercase}
#sessionCount{font-size:12px;color:#555d6b}
#sessionCount span{color:#22c55e;font-size:15px;font-weight:700}
#transcriptBox{margin:14px 16px 0;background:#0d1017;border:1px solid #1e2229;border-radius:12px;padding:14px 16px;min-height:56px;flex-shrink:0;position:relative}
#transcriptLabel{font-size:10px;color:#555d6b;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
#transcriptText{font-size:16px;color:#e8eaf0;min-height:22px}
#transcriptText.interim{color:#555d6b}
#listeningDot{position:absolute;top:14px;right:14px;width:8px;height:8px;border-radius:50%;background:#555d6b;transition:background .2s}
#listeningDot.active{background:#ef4444;animation:breathe 1.2s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.5)}}
#parseBox{margin:10px 16px 0;background:#111318;border:1px solid #1e2229;border-radius:12px;padding:12px 16px;flex-shrink:0;display:none}
#parseBox.show{display:block}
#parseLabel{font-size:10px;color:#555d6b;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
#parseFields{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.pf{background:#0d1017;border-radius:8px;padding:7px 10px}
.pf-label{font-size:10px;color:#555d6b;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.pf-val{font-size:15px;font-weight:700;color:#d4a12a}
.pf-val.missing{color:#ef4444;font-style:italic;font-size:12px}
#parseActions{display:flex;gap:8px;margin-top:10px}
#parseActions button{flex:1;padding:11px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer}
#btnConfirm{background:#22c55e;color:#000}
#btnConfirm:disabled{background:#1a3d25;color:#2a5a35}
#btnDiscard{background:#1e2229;color:#555d6b}
#logHeader{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 4px;flex-shrink:0}
#logTitle{font-size:10px;color:#555d6b;letter-spacing:1.5px;text-transform:uppercase}
#btnClearLog{font-size:11px;color:#555d6b;background:none;border:none;cursor:pointer}
#logList{flex:1;overflow-y:auto;padding:0 16px 110px;-webkit-overflow-scrolling:touch}
.log-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:6px;background:#111318;border:1px solid #1e2229;animation:slideIn .25s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.log-num{font-size:11px;color:#555d6b;width:22px;flex-shrink:0;text-align:right}
.log-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#22c55e}
.log-info{flex:1;min-width:0}
.log-name{font-size:14px;font-weight:700;color:#e8eaf0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-sub{font-size:11px;color:#555d6b;margin-top:1px}
.log-qty{font-size:18px;font-weight:900;color:#d4a12a;flex-shrink:0}
.log-undo{font-size:12px;color:#555d6b;background:none;border:none;cursor:pointer;flex-shrink:0;padding:4px}
.log-row.undone{opacity:.35;text-decoration:line-through}
#bottomBar{position:fixed;bottom:0;left:0;right:0;background:rgba(10,12,15,.96);backdrop-filter:blur(12px);border-top:1px solid #1e2229;padding:10px 16px 20px;display:flex;gap:8px;z-index:10}
#btnMic{flex:1;height:52px;border-radius:14px;border:2px solid #555d6b;background:#111318;color:#e8eaf0;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
#btnMic.listening{border-color:#ef4444;background:rgba(239,68,68,.1);color:#ef4444}
#btnCamera{height:52px;width:52px;border-radius:14px;border:2px solid #d4a12a;background:#111318;color:#d4a12a;font-size:22px;cursor:pointer;flex-shrink:0;position:relative}
#btnCamera.scanning{border-color:#3b82f6;color:#3b82f6;animation:camPulse 1s ease-in-out infinite}
@keyframes camPulse{0%,100%{opacity:1}50%{opacity:.5}}
#btnManual{height:52px;width:52px;border-radius:14px;border:2px solid #1e2229;background:#111318;color:#555d6b;font-size:20px;cursor:pointer;flex-shrink:0}
/* Camera viewfinder overlay */
#cameraOverlay{display:none;position:fixed;inset:0;background:#000;z-index:50;flex-direction:column}
#cameraOverlay.show{display:flex}
#videoEl{width:100%;flex:1;object-fit:cover}
#cameraControls{display:flex;gap:12px;padding:16px;background:#0a0c0f;align-items:center;justify-content:center}
#btnCapture{width:72px;height:72px;border-radius:50%;border:4px solid #fff;background:#d4a12a;font-size:28px;cursor:pointer}
#btnCameraClose{position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:50%;border:none;background:rgba(0,0,0,.6);color:#fff;font-size:20px;cursor:pointer;z-index:51}
#scanStatus{color:#888;font-size:13px;text-align:center;flex:1}
canvas{display:none}
/* Manual modal */
#manualModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:50;align-items:flex-end}
#manualModal.show{display:flex}
#manualSheet{background:#13161d;border-radius:20px 20px 0 0;padding:20px 20px 36px;width:100%;border-top:1px solid #1e2229}
#manualSheet h3{font-size:12px;color:#d4a12a;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
.mf{margin-bottom:12px}
.mf label{font-size:11px;color:#555d6b;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px}
.mf input{width:100%;background:#0d1017;border:1px solid #1e2229;border-radius:8px;padding:10px 12px;color:#e8eaf0;font-size:16px;outline:none}
.mf input:focus{border-color:#d4a12a}
#manualRow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
#btnManualSave{width:100%;padding:14px;border-radius:12px;border:none;background:#d4a12a;color:#000;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
#btnManualClose{width:100%;padding:10px;border-radius:12px;border:none;background:transparent;color:#555d6b;font-size:14px;cursor:pointer;margin-top:6px}
#toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:rgba(34,197,94,.95);color:#000;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:100;display:none;white-space:nowrap;max-width:90%;text-align:center}
#toast.err{background:rgba(239,68,68,.95);color:#fff}
#toast.info{background:rgba(59,130,246,.95);color:#fff}
</style>
</head>
<body>
<div id="header"><h1>&#9670; Intake</h1><div id="sessionCount">Session: <span id="sessionNum">0</span> items</div></div>
<div id="transcriptBox"><div id="transcriptLabel">Status</div><div id="transcriptText">Tap camera to scan a sidewall, or mic to speak</div><div id="listeningDot"></div></div>
<div id="parseBox">
<div id="parseLabel">Parsed — confirm or discard</div>
<div id="parseFields">
<div class="pf"><div class="pf-label">Brand</div><div class="pf-val" id="pf-brand">—</div></div>
<div class="pf"><div class="pf-label">Model</div><div class="pf-val" id="pf-model">—</div></div>
<div class="pf"><div class="pf-label">Size</div><div class="pf-val" id="pf-size">—</div></div>
<div class="pf"><div class="pf-label">Qty</div><div class="pf-val" id="pf-qty">—</div></div>
<div class="pf"><div class="pf-label">Cost</div><div class="pf-val" id="pf-cost">—</div></div>
<div class="pf"><div class="pf-label">Zone</div><div class="pf-val" id="pf-zone">—</div></div>
</div>
<div id="parseActions"><button id="btnConfirm">&#10003; SAVE</button><button id="btnDiscard">&#10005; DISCARD</button></div>
</div>
<div id="logHeader"><div id="logTitle">This session</div><button id="btnClearLog">CLEAR</button></div>
<div id="logList"></div>

<!-- Camera overlay -->
<div id="cameraOverlay">
  <button id="btnCameraClose">&#10005;</button>
  <video id="videoEl" autoplay playsinline muted></video>
  <canvas id="snapCanvas"></canvas>
  <div id="cameraControls">
    <div id="scanStatus">Point at tire sidewall — tap shutter</div>
    <button id="btnCapture">&#128247;</button>
  </div>
</div>

<div id="bottomBar">
  <button id="btnMic"><span>&#127908;</span><span id="micLabel">TAP TO SPEAK</span></button>
  <button id="btnCamera" title="Scan sidewall">&#128247;</button>
  <button id="btnManual" title="Manual entry">&#9998;</button>
</div>

<div id="manualModal">
<div id="manualSheet">
<h3>Manual Entry</h3>
<div class="mf"><label>Brand</label><input id="m-brand" type="text" placeholder="Amulet" autocomplete="off"></div>
<div class="mf"><label>Model</label><input id="m-model" type="text" placeholder="AT505" autocomplete="off"></div>
<div class="mf"><label>Size</label><input id="m-size" type="text" placeholder="11R22.5" autocomplete="off"></div>
<div id="manualRow">
<div class="mf"><label>Qty</label><input id="m-qty" type="number" placeholder="0" min="0"></div>
<div class="mf"><label>Cost</label><input id="m-cost" type="number" placeholder="0.00" step="0.01"></div>
</div>
<div class="mf"><label>Zone</label><input id="m-zone" type="text" placeholder="A1, Rack 3..." autocomplete="off"></div>
<button id="btnManualSave">SAVE ITEM</button>
<button id="btnManualClose">Cancel</button>
</div>
</div>
<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyDdxP9prJjiFFeJ1XGZewkzstgxf7Ciy4E",authDomain:"inventory-setup-b3f20.firebaseapp.com",projectId:"inventory-setup-b3f20",storageBucket:"inventory-setup-b3f20.firebasestorage.app",messagingSenderId:"162750059985",appId:"1:162750059985:web:bbe5328412c7ef49893cf0"});
const db=firebase.firestore();

const GEMINI_KEY='AIzaSyADbgMR_AUwRC3EZ7sMuF-stqOoU6rDzXk';
const GEMINI_URL=`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`;

let sessionCount=0,parsedItem=null,recognition=null,isListening=false,videoStream=null;

// ── Brands & Models ──
const BRANDS=['amulet','royal black','synergy','advance','hankook','kumho','yokohama','continental','general','bridgestone','michelin','goodyear','cooper','westlake','galaxy','genera','hill rock','vitour','roadmaster','lanvigator','nama','hercules','trans eagle','good trip','gold trip','aplus','anisun','conti','muscle power','lexmont','bzo'];
const MODELS=['AT505','AD507','AA610','AD170','AM201','SL101','TL001','DP209','DL301','DL211','DL-211','AR211','AV211','HRD1','VD88','RM272','RY617','GL689A','SP500','AH32','KRD50','E3/L3','AP','RA','CHS2','HWY CAP','DEEP TREAD'];

// ── Spoken number normalization ──
const NUM_WORDS={'zero':'0','one':'1','two':'2','three':'3','four':'4','five':'5','six':'6','seven':'7','eight':'8','nine':'9','ten':'10','eleven':'11','twelve':'12','twenty two':'22','twenty four':'24','twenty five':'25','twenty':'20','thirty':'30','forty':'40','fifty':'50','point five':'.5','and a half':'.5'};
function normalizeSpoken(text){
  let t=text.toLowerCase();
  for(const[w,d] of Object.entries(NUM_WORDS).sort((a,b)=>b[0].length-a[0].length)){t=t.replace(new RegExp('\\b'+w+'\\b','gi'),d);}
  t=t.replace(/(\d+)\s+[rR]\s+(\d+\.?\d*)/g,'$1R$2');
  t=t.replace(/(\d{2,3})\s*[\/\s]\s*(\d{2,3})\s*[rR]\s*(\d+\.?\d*)/g,'$1/$2R$3');
  return t;
}

function matchModel(text){
  const up=text.toUpperCase().replace(/[\s\-]/g,'');
  for(const m of MODELS){if(up.includes(m.replace(/[\-\/]/g,'')))return m;}
  return null;
}

function parseVoice(rawText){
  const text=normalizeSpoken(rawText);
  let brand='',model='',size='',qty=null,cost=null,zone='';
  const sm=text.match(/\b(\d{2,3}\/\d{2,3}[Rr]\d{1,2}\.?\d*|\d{2}[Rr]\d{2}\.?\d*)\b/);
  if(sm)size=sm[1].toUpperCase().replace('r','R');
  const lower=text.toLowerCase();
  for(const b of BRANDS.sort((a,c)=>c.length-a.length)){if(lower.includes(b)){brand=b.split(' ').map(w=>w[0].toUpperCase()+w.slice(1)).join(' ');break;}}
  const km=matchModel(rawText);if(km)model=km;
  let rem=text;
  if(sm)rem=rem.replace(sm[0],' ');
  if(brand)rem=rem.replace(new RegExp(brand,'i'),' ');
  if(model)rem=rem.replace(new RegExp(model,'i'),' ');
  const nums=[...rem.matchAll(/\b(\d{1,4}(?:\.\d{1,2})?)\b/g)];
  for(const n of nums){const v=parseFloat(n[1]);if(Number.isInteger(v)&&v<=999&&qty===null){qty=v;continue;}if(v>50&&cost===null)cost=v;}
  const zm=rawText.match(/\b(?:zone|rack|row|shelf|bin)\s*([A-Z0-9\-]+)/i);if(zm)zone=zm[0];
  return{brand,model,size,qty,cost,zone};
}

// ── Gemini Vision ──
async function scanWithGemini(base64Image){
  showToast('Scanning sidewall...','info');
  document.getElementById('transcriptText').textContent='Gemini reading sidewall...';
  const prompt=`You are reading a commercial truck tire sidewall. Extract ONLY these fields from the image:
- brand (manufacturer name, e.g. Amulet, Royal Black, Synergy, Advance, Hankook)
- model (model code, e.g. AT505, AD507, AM201, DP209, SL101)
- size (tire size, e.g. 11R22.5, 11R24.5, 295/75R22.5, 235/85R16)

Respond ONLY with valid JSON like: {"brand":"Amulet","model":"AT505","size":"11R22.5"}
If you cannot read a field clearly, use null. Do not include any other text.`;

  const body={
    contents:[{parts:[
      {text:prompt},
      {inline_data:{mime_type:'image/jpeg',data:base64Image}}
    ]}]
  };
  const resp=await fetch(GEMINI_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const data=await resp.json();
  const raw=data?.candidates?.[0]?.content?.parts?.[0]?.text||'{}';
  const cleaned=raw.replace(/```json|```/g,'').trim();
  return JSON.parse(cleaned);
}

function showParsed(item){
  parsedItem=item;
  const sv=(id,val,req)=>{const el=document.getElementById(id);if(val){el.textContent=val;el.className='pf-val';}else{el.textContent=req?'MISSING':'—';el.className=req?'pf-val missing':'pf-val';}};
  sv('pf-brand',item.brand,true);sv('pf-model',item.model,false);sv('pf-size',item.size,true);
  sv('pf-qty',item.qty!=null?String(item.qty):null,true);
  sv('pf-cost',item.cost!=null?'$'+item.cost.toFixed(2):null,false);
  sv('pf-zone',item.zone||null,false);
  document.getElementById('parseBox').classList.add('show');
  document.getElementById('btnConfirm').disabled=!(item.brand&&item.size&&item.qty!=null);
  // Scroll to parse box
  document.getElementById('parseBox').scrollIntoView({behavior:'smooth',block:'center'});
}
function clearParsed(){parsedItem=null;document.getElementById('parseBox').classList.remove('show');}

async function saveItem(item){
  const data={brand:item.brand||'',model:item.model||'',size:item.size||'',quantity:item.qty||0,cost:item.cost||null,zone:item.zone||'',created_at:firebase.firestore.FieldValue.serverTimestamp(),updated_at:firebase.firestore.FieldValue.serverTimestamp(),source:'intake'};
  return(await db.collection('items').add(data)).id;
}

function addToLog(item,docId){
  sessionCount++;document.getElementById('sessionNum').textContent=sessionCount;
  const log=document.getElementById('logList'),row=document.createElement('div');
  row.className='log-row';row.dataset.docId=docId;
  row.innerHTML=`<div class="log-num">${sessionCount}</div><div class="log-dot"></div><div class="log-info"><div class="log-name">${item.brand} ${item.model||''}</div><div class="log-sub">${item.size}${item.cost?' · $'+item.cost.toFixed(2):''}${item.zone?' · '+item.zone:''}</div></div><div class="log-qty">${item.qty||'?'}</div><button class="log-undo">↩</button>`;
  row.querySelector('.log-undo').addEventListener('click',async()=>{if(row.classList.contains('undone'))return;try{await db.collection('items').doc(docId).delete();row.classList.add('undone');sessionCount--;document.getElementById('sessionNum').textContent=sessionCount;showToast('Removed');}catch(e){showToast('Undo failed',true);}});
  log.prepend(row);
}

function showToast(msg,type=false){
  const t=document.getElementById('toast');t.textContent=msg;
  t.className=type==='err'?'err':type==='info'?'info':'';
  t.style.display='block';setTimeout(()=>{t.style.display='none';},2500);
}

// ── Confirm / Discard ──
document.getElementById('btnConfirm').addEventListener('click',async()=>{
  if(!parsedItem)return;
  // If qty missing, prompt
  if(parsedItem.qty==null){
    const q=prompt('How many? (enter quantity)');
    if(!q||isNaN(parseInt(q)))return;
    parsedItem.qty=parseInt(q);
  }
  const btn=document.getElementById('btnConfirm');btn.disabled=true;btn.textContent='Saving...';
  try{
    const docId=await saveItem(parsedItem);
    addToLog(parsedItem,docId);
    showToast('Saved '+parsedItem.brand+' x'+parsedItem.qty);
    clearParsed();
    document.getElementById('transcriptText').textContent='Saved. Scan next tire or speak.';
    if(navigator.vibrate)navigator.vibrate([30,30,30]);
  }catch(e){showToast('Save failed','err');btn.disabled=false;btn.textContent='✓ SAVE';}
});
document.getElementById('btnDiscard').addEventListener('click',()=>{clearParsed();document.getElementById('transcriptText').textContent='Discarded — scan or speak next tire.';});

// ── Camera ──
document.getElementById('btnCamera').addEventListener('click',openCamera);
document.getElementById('btnCameraClose').addEventListener('click',closeCamera);

async function openCamera(){
  try{
    videoStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}},audio:false});
    document.getElementById('videoEl').srcObject=videoStream;
    document.getElementById('cameraOverlay').classList.add('show');
  }catch(e){showToast('Camera error: '+e.message,'err');}
}

function closeCamera(){
  if(videoStream){videoStream.getTracks().forEach(t=>t.stop());videoStream=null;}
  document.getElementById('cameraOverlay').classList.remove('show');
}

document.getElementById('btnCapture').addEventListener('click',async()=>{
  const video=document.getElementById('videoEl');
  const canvas=document.getElementById('snapCanvas');
  canvas.width=video.videoWidth;canvas.height=video.videoHeight;
  canvas.getContext('2d').drawImage(video,0,0);
  const base64=canvas.toDataURL('image/jpeg',0.85).split(',')[1];
  closeCamera();
  try{
    const result=await scanWithGemini(base64);
    // Merge with empty qty — user must enter qty after camera scan
    const item={brand:result.brand||'',model:result.model||'',size:result.size||'',qty:null,cost:null,zone:''};
    document.getElementById('transcriptText').textContent='Sidewall read — enter qty below';
    showParsed(item);
    showToast('Sidewall read — add qty then SAVE');
  }catch(e){showToast('Scan failed: '+e.message,'err');document.getElementById('transcriptText').textContent='Scan failed — try again';}
});

// ── Voice ──
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(SR){
  recognition=new SR();recognition.continuous=false;recognition.interimResults=true;recognition.lang='en-US';
  recognition.onresult=(e)=>{let interim='',final='';for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)final+=e.results[i][0].transcript;else interim+=e.results[i][0].transcript;}const tt=document.getElementById('transcriptText');if(interim){tt.textContent=interim;tt.classList.add('interim');}if(final){tt.textContent=final;tt.classList.remove('interim');showParsed(parseVoice(final));}};
  recognition.onend=()=>{isListening=false;document.getElementById('listeningDot').classList.remove('active');document.getElementById('btnMic').classList.remove('listening');document.getElementById('micLabel').textContent='TAP TO SPEAK';};
  recognition.onerror=(e)=>{isListening=false;document.getElementById('listeningDot').classList.remove('active');document.getElementById('btnMic').classList.remove('listening');document.getElementById('micLabel').textContent='TAP TO SPEAK';if(e.error!=='no-speech')showToast('Mic: '+e.error,'err');};
}
document.getElementById('btnMic').addEventListener('click',()=>{
  if(!recognition){showToast('Voice not supported','err');return;}
  if(isListening){recognition.stop();}
  else{clearParsed();document.getElementById('transcriptText').textContent='Listening...';document.getElementById('transcriptText').classList.add('interim');recognition.start();isListening=true;document.getElementById('listeningDot').classList.add('active');document.getElementById('btnMic').classList.add('listening');document.getElementById('micLabel').textContent='TAP TO STOP';if(navigator.vibrate)navigator.vibrate(20);}
});

// ── Manual ──
document.getElementById('btnManual').addEventListener('click',()=>{document.getElementById('manualModal').classList.add('show');document.getElementById('m-brand').focus();});
document.getElementById('btnManualClose').addEventListener('click',()=>{document.getElementById('manualModal').classList.remove('show');});
document.getElementById('btnManualSave').addEventListener('click',async()=>{
  const item={brand:document.getElementById('m-brand').value.trim(),model:document.getElementById('m-model').value.trim(),size:document.getElementById('m-size').value.trim(),qty:parseInt(document.getElementById('m-qty').value)||0,cost:parseFloat(document.getElementById('m-cost').value)||null,zone:document.getElementById('m-zone').value.trim()};
  if(!item.brand||!item.size||!item.qty){showToast('Brand, size, qty required','err');return;}
  try{const docId=await saveItem(item);addToLog(item,docId);showToast('Saved '+item.brand+' x'+item.qty);document.getElementById('manualModal').classList.remove('show');['m-brand','m-model','m-size','m-qty','m-cost','m-zone'].forEach(id=>document.getElementById(id).value='');}
  catch(e){showToast('Save failed','err');}
});
document.getElementById('btnClearLog').addEventListener('click',()=>{document.getElementById('logList').innerHTML='';sessionCount=0;document.getElementById('sessionNum').textContent='0';});
</script>
</body>
</html>
